version: '3.8'

services:
  # API Backend (Express)
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: lacasita-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/data/lacasita.db
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - lacasita-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: lacasita-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

  # Redis (para caché y sesiones - opcional)
  redis:
    image: redis:7-alpine
    container_name: lacasita-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # n8n (automatizaciones - opcional)
  n8n:
    image: n8nio/n8n:latest
    container_name: lacasita-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password123
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n:/home/node/.n8n/workflows
    restart: unless-stopped

  # Nginx (proxy inverso)
  nginx:
    image: nginx:alpine
    container_name: lacasita-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  lacasita-data:
  redis-data:
  n8n-data:
